    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;

            text-align: center;
        }
        header {
            background-color: #F97316;
            color: white;
            padding: 20px 0;
            font-size: 24px;
            font-weight: bold;
            text-transform: uppercase;
        }
        nav {
            display: flex;
            justify-content: center;
            background-color: #F97316;
            padding: 10px 0;
            gap: 15px;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-size: 18px;
            padding: 10px 20px;
            transition: 0.3s;
            border-radius: 5px;
        }

        nav a:hover {
            background-color: #ff4500;
        }

        .fixed-image {
            width: 30px;
            height: 30px;
            vertical-align: middle;
            border-radius: 50%;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 30px;
        }

        /* Карточки */
        .card {
            width: 250px;
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }

        .card:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.3);
        }

        .card img {
            width: 100%;
            height: auto;
            border-radius: 15px 15px 0 0;
            transition: opacity 0.3s;
        }

        .card:hover img {
            opacity: 0.8;
        }

        .card-content {
            padding: 15px;
            text-align: center;
            font-size: 16px;
            font-weight: bold;
            color: #333;
        }
          details {
            background: white;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            position: fixed;
            bottom: 20px;
            right: 20px;
            max-width: 250px;
        }

        summary {
            font-weight: bold;
            color: #ff5733;
            outline: none;
        }

        .content {
            margin-top: 10px;
            color: #333;
        }
    </style>
